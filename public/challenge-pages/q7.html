<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyDef CTF – Q7 Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e8e8f0; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #13131f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 2rem; width: 380px; }
  h1 { color: #e63946; font-size: 1.2rem; margin-bottom: 0.5rem; text-align:center; }
  p { color: #8888aa; font-size: 0.8rem; margin-bottom: 1.5rem; text-align:center; line-height:1.5; }
  label { display:block; font-size:0.75rem; color:#8888aa; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
  input { width:100%; background:#0f0f1a; border:1px solid #1e1e2e; border-radius:4px; padding:0.6rem 0.75rem; color:#e8e8f0; font-family:monospace; font-size:0.9rem; margin-bottom:1rem; }
  input:focus { outline:none; border-color:#e63946; }
  button { width:100%; background:#e63946; color:white; border:none; border-radius:4px; padding:0.75rem; font-family:monospace; font-size:0.9rem; cursor:pointer; }
  button:hover { background:#ff4d5a; }
  #result { margin-top:1rem; padding:1rem; border-radius:6px; font-size:0.85rem; display:none; }
  .success { background:#003322; border:1px solid #00ff8840; color:#00ff88; }
  .fail { background:#2d0a0a; border:1px solid #e6394640; color:#e63946; }
  pre { font-size:0.7rem; color:#44445a; margin-top:1rem; background:#0a0a0f; padding:0.75rem; border-radius:4px; overflow-x:auto; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="card">
  <h1>SecureLogin v0.1</h1>
  <p>Enter your credentials. This system uses direct SQL queries — totally fine, right?</p>
  <label>Username</label>
  <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
  <label>Password</label>
  <input type="password" id="password" placeholder="Enter password" />
  <button onclick="doLogin()">Login</button>
  <div id="result"></div>
  <pre id="query"></pre>
</div>
<script>
function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const query = `SELECT * FROM users WHERE username = '${u}' AND password = '${p}'`;
  document.getElementById('query').textContent = 'Query: ' + query;
  const injected = /'\s*or\s*'1'\s*=\s*'1/i.test(u) || /--/.test(u) || /'\s*or\s*1\s*=\s*1/i.test(u);
  const result = document.getElementById('result');
  result.style.display = 'block';
  if (injected) {
    result.className = 'success';
    result.innerHTML = '✓ Logged in as admin!<br><br><strong>FLAG{SQL_INJECTION_BYPASSED}</strong>';
  } else if (u === 'admin' && p === 'supersecret123') {
    result.className = 'success';
    result.innerHTML = '✓ Logged in as admin! (But try SQL injection next time)';
  } else {
    result.className = 'fail';
    result.textContent = '✗ Invalid credentials.';
  }
}
</script>
</body>
</html>
